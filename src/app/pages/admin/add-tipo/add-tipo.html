<section class="contenedor">

    <h1>+Tipo</h1>

    <div class="contenedor-formulario">

        <form #form="ngForm" class="formulario" >

            <div>
                <label for="tipo">Tipo*</label>
                <input type="text" id="tipo" name="tipo" required class="form-control" style="text-transform: uppercase;"    autocomplete="off" >
            </div>

            <div class="contenedor-boton">

                <button class="btn btn-md btn-primary" type="submit" [disabled]="form.invalid">+Tipo</button>

            </div>

        </form>


    </div>



</section>
